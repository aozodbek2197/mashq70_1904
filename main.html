<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>20. Memory Card Game</title>
  <style>
    body { font-family: Arial; text-align: center; background: #2c3e50; color: white; padding: 20px; }
    .game { max-width: 600px; margin: 30px auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .card { width: 100%; height: 120px; background: #34495e; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 40px; transition: 0.4s; }
    .card.flipped { background: white; transform: rotateY(180deg); }
    .card.matched { background: #27ae60; }
  </style>
</head>
<body>
  <h1>Memory Game (Juftlik topish)</h1>
  <div class="game" id="game"></div>
  <p>Harakatlar: <strong id="moves">0</strong></p>

  <script>
    const emojis = ['🍎','🍌','🍇','🍓','🍒','🍑','🥝','🍍'];
    const cards = [...emojis, ...emojis];
    cards.sort(() => Math.random() - 0.5);

    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;

    const game = document.getElementById('game');

    cards.forEach((emoji, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.emoji = emoji;
      card.dataset.index = index;
      card.onclick = () => flipCard(card);
      game.appendChild(card);
    });

    function flipCard(card) {
      if (flippedCards.length >= 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;

      card.textContent = card.dataset.emoji;
      card.classList.add('flipped');
      flippedCards.push(card);

      if (flippedCards.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;

        if (flippedCards[0].dataset.emoji === flippedCards[1].dataset.emoji) {
          flippedCards.forEach(c => c.classList.add('matched'));
          matchedPairs++;
          flippedCards = [];
          if (matchedPairs === emojis.length) {
            setTimeout(() => alert(`Tabriklaymiz! ${moves} ta harakat bilan yutdingiz! 🎉`), 500);
          }
        } else {
          setTimeout(() => {
            flippedCards.forEach(c => {
              c.textContent = '';
              c.classList.remove('flipped');
            });
            flippedCards = [];
          }, 1000);
        }
      }
    }
  </script>
</body>
</html>
